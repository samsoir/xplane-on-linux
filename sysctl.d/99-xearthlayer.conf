# Memory watermarks — give kswapd enough lead time to reclaim
# pages in the background before applications are forced to wait.
# See: https://www.emvisio.com/en/linux/system/tuning_casestudy.html
vm.min_free_kbytes = 1048576
vm.watermark_scale_factor = 500

# Swap behavior — prefer keeping application memory resident.
# Only swap under genuine pressure.
vm.swappiness = 8

# Single-page swap reads. NVMe and SSDs have no seek penalty,
# so readahead during swap-in wastes memory under pressure.
vm.page_cluster = 0

# Dirty page limits — start background writeback early and cap
# the maximum dirty page accumulation. This is especially important
# when the tile cache is on a SATA SSD with lower write throughput
# than NVMe, as dirty pages can accumulate faster than the drive
# can flush them.
vm.dirty_background_ratio = 3
vm.dirty_ratio = 10
